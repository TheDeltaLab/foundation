name: NPM Publish

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - "cli-v*"
  pull_request:
    # PRs that touch the workflow or the CLI package trigger a dry-run.
    paths:
      - .github/workflows/npm-publish.yml
      - apps/cli/**
      - pnpm-lock.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gh-release:
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: extract_version
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -e
          if [[ $GITHUB_REF =~ refs/tags/cli-v(.*) ]]; then
            VERSION=${BASH_REMATCH[1]}
            TAG=cli-v$VERSION
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "Failed to extract version from $GITHUB_REF"
            exit 1
          fi
          echo "Extracted version $VERSION from $GITHUB_REF"
      - name: Create GH release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(steps.extract_version.outputs.version, '-') }}
          tag_name: ${{ steps.extract_version.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          name: "@delta-ai/foundation v${{ steps.extract_version.outputs.version }}"

  publish:
    name: Publish @delta-ai/foundation
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/cli-v')
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -e
          TAG_VERSION="${GITHUB_REF#refs/tags/cli-v}"
          PKG_VERSION=$(node -p "require('./apps/cli/package.json').version")
          echo "tag=$TAG_VERSION pkg=$PKG_VERSION"
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match apps/cli/package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build CLI
        run: pnpm -F @delta-ai/foundation build

      - name: Publish
        working-directory: apps/cli
        env:
          DRY_RUN: ${{ !startsWith(github.ref, 'refs/tags/cli-v') }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          npm config set provenance true
          ARGS="--access public"
          if [[ $DRY_RUN == "true" ]]; then
            echo "Dry run: running npm pack to verify package contents"
            npm pack $ARGS
            exit 0
          fi
          VERSION=$(node -p "require('./package.json').version")
          if [[ $VERSION == *-* ]]; then
            ARGS="$ARGS --tag preview"
          fi
          npm publish $ARGS

  report-failure:
    name: Report Workflow Failure
    runs-on: ubuntu-latest
    needs: [publish]
    if: always() && failure() && startsWith(github.ref, 'refs/tags/cli-v')
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `NPM Publish failed for ${context.ref}`;
            const body = [
              `Workflow **${context.workflow}** failed.`,
              ``,
              `- Ref: \`${context.ref}\``,
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure'],
            });
